<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zhilicon Chat</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #161922;
    --panel-2: #1e2330;
    --accent: #6ce5b0;
    --accent-dim: rgba(108, 229, 176, 0.15);
    --text: #e4e6ed;
    --text-dim: #8b93a7;
    --border: #262b38;
    --user: #4b8cf7;
    --assistant: #6ce5b0;
    --error: #ff7a7a;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  header .subtitle {
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--font-mono);
  }
  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  #status-dot.ready { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  #status-dot.error { background: var(--error); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .msg {
    padding: 12px 16px;
    border-radius: 10px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
  }
  .msg.user { border-left: 3px solid var(--user); }
  .msg.assistant { border-left: 3px solid var(--assistant); }
  .msg.error { border-left: 3px solid var(--error); color: var(--error); }
  .msg .role {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .msg .content { font-family: var(--font-mono); font-size: 13px; }
  .msg.streaming .content::after {
    content: "▌";
    display: inline-block;
    margin-left: 2px;
    animation: blink 1s infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    padding: 14px 20px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  form {
    max-width: 820px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    resize: vertical;
    min-height: 46px;
    max-height: 200px;
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent); color: var(--bg); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .controls {
    max-width: 820px;
    margin: 0 auto 8px auto;
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .controls label { display: flex; gap: 6px; align-items: center; }
  .controls input[type="number"] {
    width: 64px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .controls input[type="text"] {
    width: 220px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 6px;
    font-family: var(--font-mono);
    font-size: 12px;
  }
</style>
</head>
<body>
<header>
  <div id="status-dot"></div>
  <h1>Zhilicon Chat</h1>
  <div class="subtitle" id="model-id">—</div>
  <div class="subtitle" id="sovereign-badge" style="margin-left:auto"></div>
</header>

<main id="messages"></main>

<footer>
  <div class="controls">
    <label>endpoint
      <input type="text" id="endpoint" value="http://localhost:8080">
    </label>
    <label>zone
      <input type="text" id="zone" value="" placeholder="optional">
    </label>
    <label>temp
      <input type="number" id="temp" value="0.8" step="0.1" min="0" max="2">
    </label>
    <label>max_tokens
      <input type="number" id="max-tokens" value="128" step="16" min="1" max="2048">
    </label>
    <label>top_p
      <input type="number" id="top-p" value="0.95" step="0.05" min="0.01" max="1">
    </label>
  </div>
  <form id="chat-form">
    <textarea id="prompt" placeholder="Type a message and press Enter (Shift+Enter for newline)..." rows="2"></textarea>
    <button type="submit" id="send-btn">Send</button>
  </form>
</footer>

<script>
// ─── State ────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const form = document.getElementById("chat-form");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");
const modelIdEl = document.getElementById("model-id");
const endpointEl = document.getElementById("endpoint");

const history = [];
let inflightController = null;

// ─── Helpers ──────────────────────────────────────────────────────────────
// Note on safety: every dynamic piece of content is assigned via
// textContent (which escapes). Structural DOM is built with
// createElement — no innerHTML anywhere.
function addMessage(role, content, extraClass) {
  const el = document.createElement("div");
  el.className = "msg " + role + (extraClass ? " " + extraClass : "");
  const roleEl = document.createElement("div");
  roleEl.className = "role";
  roleEl.textContent = role;
  const contentEl = document.createElement("div");
  contentEl.className = "content";
  contentEl.textContent = content;
  el.appendChild(roleEl);
  el.appendChild(contentEl);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

addMessage(
  "assistant",
  "Connected to the Zhilicon serving layer. With a random-init " +
    "reference model the completions are byte-level gibberish — load a " +
    "real checkpoint at ZHILICON_MODEL_PATH inside the container to see " +
    "useful output."
);

async function pollReadiness() {
  try {
    const r = await fetch(endpointEl.value + "/readyz");
    if (!r.ok) throw new Error("readyz " + r.status);
    const j = await r.json();
    statusDot.className = "ready";
    modelIdEl.textContent = j.model_id || "";
  } catch (e) {
    statusDot.className = "error";
    modelIdEl.textContent = "not connected";
  }
  // Probe the sovereign attestation endpoint — if present, label the
  // header with the zone ID + backend kind so the user can see the
  // deployment's sovereign identity at a glance.
  try {
    const r = await fetch(endpointEl.value + "/v1/sovereign/attestation");
    if (r.ok) {
      const j = await r.json();
      const badge = document.getElementById("sovereign-badge");
      const classification = j.data_classification || "";
      const zone = j.zone_id || "";
      const backend = j.backend_kind || "";
      badge.textContent =
        "zone=" + zone + " · class=" + classification + " · backend=" + backend;
    }
  } catch (_) {
    // /v1/sovereign/attestation not mounted → deployment is
    // non-sovereign. Leave the badge blank.
  }
}

// ─── SSE streaming ────────────────────────────────────────────────────────
async function streamChat(userMessage) {
  history.push({ role: "user", content: userMessage });
  addMessage("user", userMessage);
  const assistantEl = addMessage("assistant", "", "streaming");
  const contentEl = assistantEl.querySelector(".content");

  inflightController = new AbortController();

  try {
    const zoneVal = (document.getElementById("zone").value || "").trim();
    const headers = { "content-type": "application/json" };
    if (zoneVal) headers["X-Zhilicon-Zone"] = zoneVal;
    const resp = await fetch(endpointEl.value + "/v1/chat/completions", {
      method: "POST",
      headers: headers,
      body: JSON.stringify({
        messages: history,
        max_tokens: parseInt(document.getElementById("max-tokens").value, 10),
        temperature: parseFloat(document.getElementById("temp").value),
        top_p: parseFloat(document.getElementById("top-p").value),
        stream: true,
      }),
      signal: inflightController.signal,
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error("HTTP " + resp.status + ": " + err);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let fullContent = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      // SSE frames terminate with \n\n.
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const frame = buf.slice(0, idx).trim();
        buf = buf.slice(idx + 2);
        if (!frame.startsWith("data:")) continue;
        const data = frame.slice("data:".length).trim();
        if (data === "[DONE]") break;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices && parsed.choices[0] &&
                         parsed.choices[0].delta &&
                         parsed.choices[0].delta.content;
          if (delta) {
            fullContent += delta;
            contentEl.textContent = fullContent;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch (_) {
          // Malformed frame — ignore; the next one usually recovers.
        }
      }
    }

    history.push({ role: "assistant", content: fullContent });
  } catch (e) {
    if (e.name === "AbortError") return;
    assistantEl.remove();
    addMessage("error", "⚠ " + e.message, "error");
  } finally {
    assistantEl.classList.remove("streaming");
    inflightController = null;
    sendBtn.disabled = false;
    sendBtn.textContent = "Send";
  }
}

// ─── Event wiring ─────────────────────────────────────────────────────────
form.addEventListener("submit", function (e) {
  e.preventDefault();
  const text = promptEl.value.trim();
  if (!text) return;
  promptEl.value = "";
  sendBtn.disabled = true;
  sendBtn.textContent = "Sending…";
  streamChat(text);
});

promptEl.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event("submit"));
  }
});

endpointEl.addEventListener("change", pollReadiness);
pollReadiness();
setInterval(pollReadiness, 15000);
</script>
</body>
</html>
